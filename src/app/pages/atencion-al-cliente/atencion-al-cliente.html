<div class="atencion-container">
  <h2 class="titulo-seccion">ATENCIÓN AL CLIENTE</h2>
  <p class="subtitulo">¿Cómo prefieres comunicarte con nosotros?</p>

  <div class="social-grid">
    <div class="social-item" (click)="registrarYRedirigir('whatsapp')">
      <span class="icon wa">WA</span>
      <div class="social-text">
        <strong>WhatsApp</strong>
        <span>+51 959 554 211</span>
      </div>
    </div>

    <div class="social-item" (click)="registrarYRedirigir('instagram')">
      <span class="icon ig">IG</span>
      <div class="social-text">
        <strong>Instagram</strong>
        <span>@ivano.oficial</span>
      </div>
    </div>

    <div class="social-item" (click)="registrarYRedirigir('facebook')">
      <span class="icon fb">FB</span>
      <div class="social-text">
        <strong>Facebook</strong>
        <span>@ivanofootwear</span>
      </div>
    </div>

    <div class="social-item" (click)="registrarYRedirigir('tiktok')">
      <span class="icon tk">TK</span>
      <div class="social-text">
        <strong>TikTok</strong>
        <span>@ivanooficial</span>
      </div>
    </div>

    <div class="social-item" (click)="registrarYRedirigir('gmail')">
      <span class="icon gm">GM</span>
      <div class="social-text">
        <strong>Correo Electrónico</strong>
        <span>ventas@ivano.pe</span>
      </div>
    </div>
  </div>
</div>
