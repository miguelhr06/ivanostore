<div class="pago-container">
  <div class="pago-main-card">
    <div class="pago-sidebar">
      <div class="metodo-item" [class.active]="metodoSeleccionado === 'culqi'" (click)="seleccionarMetodo('culqi')">
        <i class="fas fa-credit-card"></i> <span>Tarjeta / Cuotéalo</span>
      </div>
      <div class="metodo-item" [class.active]="metodoSeleccionado === 'billeteras'" (click)="seleccionarMetodo('billeteras')">
        <i class="fas fa-mobile-alt"></i> <span>Yape / Plin</span>
      </div>
      <div class="metodo-item" [class.active]="metodoSeleccionado === 'transferencia'" (click)="seleccionarMetodo('transferencia')">
        <i class="fas fa-university"></i> <span>Transferencia</span>
      </div>
    </div>

    <div class="pago-detail">
      <div [ngSwitch]="metodoSeleccionado">
        <div *ngSwitchCase="'culqi'" class="view-center">
          <img src="assets/culqi-full.png" class="logo-pasarela" alt="Culqi">
          <p>Haz clic en "PAGAR AHORA" para abrir el formulario seguro de Culqi.</p>
        </div>
        </div>
    </div>
  </div>

  <aside class="pago-summary">
    <div class="summary-box">
      <h3>Resumen de Orden</h3>
      <div class="total-line"><span>Total:</span> <strong>S/ {{ totalFinal | number:'1.2-2' }}</strong></div>
      <label><input type="checkbox" [(ngModel)]="aceptaTerminos"> Acepto términos</label>
      <button class="btn-checkout" [disabled]="!aceptaTerminos" (click)="procesarPedido()">
        {{ metodoSeleccionado === 'transferencia' ? 'CONFIRMAR PEDIDO' : 'PAGAR AHORA' }}
      </button>
    </div>
  </aside>
</div>
