<div class="modal-overlay" (click)="cerrarModal()">
  <div class="login-card" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="cerrarModal()">&times;</button>

    <div class="login-header">
      <h2>Bienvenido</h2>
      <p>Inicia sesión en tu cuenta de <strong>IVANO</strong></p>
    </div>

    <form (submit)="login()">
      <div class="input-container">
        <label>Correo electrónico</label>
        <input 
          type="email" 
          [(ngModel)]="email" 
          name="email" 
          placeholder="ejemplo@correo.com" 
          required>
      </div>

      <div class="input-container">
        <label>Contraseña</label>
        <!-- Contenedor relativo para posicionar el ojo -->
        <div class="password-wrapper" style="position: relative;">
          <input 
            [type]="verPassword ? 'text' : 'password'" 
            [(ngModel)]="password" 
            name="password" 
            placeholder="••••••••" 
            required
            style="width: 100%; padding-right: 40px;">
          
          <!-- Icono del ojo interactivo -->
          <span class="toggle-password" 
                (click)="verPassword = !verPassword"
                style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666;">
            <i [class]="verPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'"></i>
          </span>
        </div>
      </div>

      <div class="forgot-password">
  <a (click)="recuperarClave()" style="cursor: pointer;">¿Olvidaste tu contraseña?</a>
</div>

      <button type="submit" class="login-btn" [disabled]="!email || !password">
        <span>Ingresar</span>
      </button>
    </form>

    <div class="login-footer">
      <p>¿No tienes una cuenta? 
        <a (click)="irARegistro()" style="cursor: pointer;">Regístrate</a>
      </p>
    </div>
  </div>
</div>
